<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="bootstrap.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container ">
        <form class=" mt-3">
            <h3 class="text-center">Welcome back!</h3>

            <div class="mb-3 ">
                <label for="email" class="form-label">Email Address :</label>
                <input type="email" id="email" class="form-control" placeholder="Enter Email">
            </div>
            <div class="mb-3 ">
                <label for="Pass" class="form-label">Password :</label>
                <input type="password" id="pass" class="form-control" placeholder="Enter Password">

            </div>



            <div class="mb-3 form-check form-switch ">

                <label for="che" class="form-check-label"></label>
                <input type="checkbox" id="che" class="form-check-label" name="remember"> Remember me &nbsp;

            </div>
            <p class="text-black"><a href="#" style="color: black;">Forgot password?</a></p>

            <div>
                <button class="btn btn-primary mt-3 text-white mb-3 "> Login</button>
            </div>
            <p>Don't have an account?<a href="create_account.html">Create Account</a></p>
        </form>
    </div>

</body>

</html>
