<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSTRAA|Fashion</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <style>
            .container {
        border: 2px solid black;
        border-radius: 10px;
        border: hidden;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
       

    }
    .form-control:hover{
        background-color: lightgray;   
             
    }
  

   
    </style>
</head>

<body>
    <div class=" container-fluid vh-50 d-flex mt-5">
        <div class="container w-25  text-white  text-container me-0">
            <p> Create your own account on Vastraa to save your orders and wishlist</p>
        </div>
        <div class="container w-50 ">
            <form class=" mt-3">
                <h3 class="text-center">Create Account</h3>
                <div class="mb-3 mt-3">
                    <label for="name" class="form-label">Name :</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter Name">
                </div>
                <div class="mb-3 ">
                    <label for="email" class="form-label">Email :</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter Email">
                </div>
                <div class="mb-3 ">
                    <label for="pn" class="form-label">Mobile no. :</label>
                    <input type="number" id="pass" class="form-control" placeholder="Enter Mobile no.">

                </div>
                <div class="mb-3 ">
                    <label for="Pass" class="form-label">Password :</label>
                    <input type="password" id="pass" class="form-control" placeholder="Enter email Password">

                </div>
                <div class="mb-3 ">
                    <label for="Pass" class="form-label">Confirm Password :</label>
                    <input type="password" id="pass" class="form-control" placeholder="Confirm Password">

                </div>
                <div class="mb-3 mt-3">
                    <label for="uname" class="form-label">Username :</label>
                    <input type="text" id="uname" class="form-control" placeholder="Enter Username">
                </div>



                <div class=" form-check  ms-0 ">
                    <input type="checkbox" id="che" class="form-check-label ms-0" name="remember">
                    <label for="che" class="ms-0"> I agree to terms & conditions</label>

                </div>


                <div class="m-3">
                    <button class="btn btn-primary mt-3 text-white mb-3"> Create Account</button>
                </div>
                <div class="mb-3">
                    <p class="text-center text-muted">Already have an account? <span><a
                                href="login.html">Login</a></span></p>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
